# Advanced Security Configuration - Enterprise Security Parameterization
# ===================================================================
# Complete security system parameterization with compliance and threat management

# Core Security Settings
security.enabled: true
security.encryption.enabled: true
security.encryption.algorithm: AES256
security.encryption.key_rotation_days: 90
security.encryption.key_backup_enabled: true

# Authentication & Authorization
security.auth.multi_factor_enabled: true
security.auth.session_timeout_minutes: 30
security.auth.max_login_attempts: 5
security.auth.lockout_duration_minutes: 15
security.auth.password_policy: strong

# Access Control
security.access.rbac_enabled: true
security.access.permission_inheritance: true
security.access.resource_protection: true
security.access.audit_access: true

# Data Protection
security.data.encryption_at_rest: true
security.data.encryption_in_transit: true
security.data.classification_enabled: true
security.data.retention_policies: true

# Audit & Compliance
security.audit.enabled: true
security.audit.retention_days: 365
security.audit.log_security_events: true
security.audit.compliance_reporting: true
security.audit.integrity_checking: true

# Threat Detection
security.threat_detection.enabled: true
security.threat_detection.anomaly_threshold: 0.8
security.threat_detection.block_suspicious: true
security.threat_detection.real_time_monitoring: true
security.threat_detection.alerting_enabled: true

# Network Security
security.network.firewall_enabled: true
security.network.ssl_verification: true
security.network.ip_whitelisting: false
security.network.rate_limiting: true
security.network.ddos_protection: false

# Endpoint Security
security.endpoint.antivirus_enabled: false
security.endpoint.integrity_monitoring: true
security.endpoint.device_encryption: false
security.endpoint.remote_wipe: false

# Compliance Standards
security.compliance.gdpr_enabled: true
security.compliance.soc2_enabled: true
security.compliance.hipaa_enabled: false
security.compliance.pci_dss_enabled: false
security.compliance.auto_reporting: true

# Key Management
security.key_management.auto_rotate: true
security.key_management.backup_enabled: true
security.key_management.distributed: false
security.key_management.hsm_integration: false

# Incident Response
security.incident.response_enabled: true
security.incident.auto_containment: false
security.incident.forensic_logging: true
security.incident.notification_channels: ["email", "sms"]

# Monitoring & Alerting
security.monitoring.real_time: true
security.monitoring.alert_thresholds: true
security.monitoring.dashboard_enabled: true
security.monitoring.report_generation: true

# Performance & Scalability
security.performance.monitoring_enabled: true
security.performance.encryption_overhead_limit: 10
security.performance.cache_enabled: true
security.performance.load_balancing: true

# Integration Settings
security.integration.sso_enabled: false
security.integration.ldap_enabled: false
security.integration.oauth_providers: []
security.integration.api_security: true

# Testing & Validation
security.testing.penetration_testing: false
security.testing.vulnerability_scanning: false
security.testing.compliance_audits: false
security.testing.security_headers: true

# Backup & Recovery
security.backup.encryption_enabled: true
security.backup.offline_storage: false
security.backup.recovery_testing: false
security.backup.disaster_recovery: false

# User Training & Awareness
security.training.enabled: false
security.training.phishing_simulation: false
security.training.policy_acknowledgment: false
security.training.progress_tracking: false

# Third-party Integration
security.third_party.vulnerability_feed: false
security.third_party.threat_intelligence: false
security.third_party.security_advisories: false
security.third_party.incident_sharing: false

# Advanced Features
security.advanced.zero_trust: false
security.advanced.ai_threat_detection: false
security.advanced.behavioral_analysis: false
security.advanced.predictive_security: false

# Logging & Forensics
security.logging.level: info
security.logging.encrypted: false
security.logging.immutable: false
security.logging.distributed: false
security.logging.retention_years: 7

# Emergency Controls
security.emergency.kill_switch: false
security.emergency.data_wipe: false
security.emergency.system_lockdown: false
security.emergency.incident_response: true
