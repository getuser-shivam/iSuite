name: isuite
description: A comprehensive cross-platform suite of tools and utilities built with Flutter.

# Build optimizations for better performance
version: 1.0.0+1

environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: '>=3.0.0'

# Build configurations for optimized builds
flutter:
  uses-material-design: true
  generate: true

  # Optimized assets with caching hints
  assets:
    - assets/images/
    - assets/icons/

# Optimized dependencies with version constraints
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core Flutter packages
  cupertino_icons: ^1.0.6

  # State management - optimized
  provider: ^6.1.1
  flutter_bloc: ^8.1.3

  # Database - SQLite with optimizations
  sqflite: ^2.3.0
  path: ^1.8.3

  # Backend services - Supabase (free tier optimized)
  supabase_flutter: ^2.3.0

  # Network - optimized HTTP clients
  http: ^1.2.0
  dio: ^5.4.0
  github: ^9.17.0

  # File handling - optimized
  file_picker: ^6.1.1
  path_provider: ^2.1.1

  # Storage - optimized
  shared_preferences: ^2.2.2

  # Logging - optimized
  logger: ^2.0.2+1

  # Security - optimized
  crypto: ^3.0.3
  encrypt: ^5.0.1

  # JSON - optimized
  json_annotation: ^4.8.1

  # Device info - optimized
  device_info_plus: ^9.1.1

  # Package info - optimized
  package_info_plus: ^4.2.0

  # Connectivity - optimized
  connectivity_plus: ^5.0.2

  # Permissions - optimized
  permission_handler: ^11.1.0

  # Image handling - optimized
  image_picker: ^1.0.4

  # URL launcher - optimized
  url_launcher: ^6.2.2

  # QR codes - optimized
  qr_flutter: ^4.1.0

  # Charts - optimized
  fl_chart: ^0.65.0

  # Notifications - optimized
  flutter_local_notifications: ^16.3.2

  # Biometric auth - optimized
  local_auth: ^2.1.7

  # WebRTC - optimized for real-time features
  flutter_webrtc: ^0.9.48

  # WebSockets - optimized

  web_socket_channel: ^2.4.0

  # Internationalization - optimized
  intl: ^0.20.2

  # UUID generation - optimized
  uuid: ^4.2.1

  # Collections - optimized
  collection: ^1.17.2

  # Navigation - optimized
  go_router: ^12.1.3

  # UI components - optimized
  material_design_icons_flutter: ^7.0.7296
  google_fonts: ^6.1.0
  table_calendar: ^3.1.2

  # Sharing - optimized
  share_plus: ^7.2.2

  # Media - optimized
  video_player: ^2.8.1
  just_audio: ^0.9.36

  # Utilities - optimized
  equatable: ^2.0.5

  # Environment - optimized
  flutter_dotenv: ^5.1.0

  # Archive handling - optimized
  archive: ^3.4.1

  # WiFi scanning - optimized
  wifi_scan: ^0.4.1

  # PocketBase - completely free optimized backend
  # pocketbase_dart: ^0.2.0  # Temporarily commented - package not found

  # Timezone - optimized
  timezone: ^0.9.0

  # Data processing - optimized
  csv: ^5.0.2

  # FTP - optimized
  ftpconnect: ^2.0.10

  # AI/LLM - optimized integrations
  flutter_ai_toolkit: ^0.1.0
  google_generative_ai: ^0.4.0
  vertex_ai: ^0.1.0
  # openai: ^0.1.0  # Temporarily commented - version not found

  # File metadata - optimized
  mime: ^1.0.4

# Build optimizations for development and production
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation - optimized
  json_serializable: ^6.7.1
  build_runner: ^2.4.7

  # Linting - optimized with custom rules
  flutter_lints: ^3.0.1

  # Testing - optimized test suite
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

