# iSuite Advanced CI/CD Pipeline Configuration
# ===========================================
#
# Enterprise-grade Continuous Integration and Deployment pipeline
# with automated testing, security scanning, and multi-environment deployment.

# =============================================================================
# GITHUB ACTIONS CI PIPELINE
# =============================================================================
# Copy this to: .github/workflows/ci.yml

name: iSuite CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FLUTTER_VERSION: '3.19.0'
  JAVA_VERSION: '11'
  NODE_VERSION: '18'

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
      - run: flutter pub get
      - run: flutter doctor --android-licenses
      - run: flutter analyze --fatal-infos --fatal-warnings
      - run: |
          if [ "$(flutter format --dry-run --set-exit-if-changed . | wc -l)" -gt 0 ]; then
            echo "Code is not formatted properly. Run 'flutter format .' to fix."
            exit 1
          fi

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
      - run: flutter pub get
      - run: flutter test --coverage
      - uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: true

  build:
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
      - uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      - run: flutter pub get
      - run: flutter build apk --release
      - run: flutter build web --release
      - uses: actions/upload-artifact@v3
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
      - uses: actions/upload-artifact@v3
        with:
          name: web-build
          path: build/web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v3
        with:
          name: android-apk
      - uses: actions/download-artifact@v3
        with:
          name: web-build
      # Add deployment steps for your chosen platform (e.g., Firebase Hosting, Play Store, etc.)
      - run: echo "Deploy to production environment"
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
      - run: flutter pub get
      - run: flutter test --coverage --test-randomize-ordering-seed random
      - uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info

  widget-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
      - run: flutter pub get
      - run: flutter test --platform chrome test/widget/

  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests, widget-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: |
          wget https://github.com/pocketbase/pocketbase/releases/download/v0.16.0/pocketbase_0.16.0_linux_amd64.tar.gz
          tar -xzf pocketbase_0.16.0_linux_amd64.tar.gz
          ./pocketbase serve --http=127.0.0.1:8090 &
          sleep 5
      - uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
      - run: flutter pub get
      - run: flutter test integration_test/

  build-android:
    runs-on: ubuntu-latest
    needs: [unit-tests, widget-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
      - run: flutter pub get
      - run: flutter build apk --debug --split-debug-info=symbols
      - run: flutter build apk --release --split-debug-info=symbols --obfuscate --split-per-abi
      - uses: actions/upload-artifact@v3
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-*.apk

  build-web:
    runs-on: ubuntu-latest
    needs: [unit-tests, widget-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
      - run: flutter pub get
      - run: flutter build web --release --base-href=/isuite/
      - uses: actions/upload-artifact@v3
        with:
          name: web-build
          path: build/web/

  security-scan:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  quality-gate:
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, widget-tests, integration-tests, security-scan]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.code-quality.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.widget-tests.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.security-scan.result }}" == "failure" ]; then exit 1; fi
          echo "All quality gates passed! ✅"

# =============================================================================
# DEPLOYMENT PIPELINES
# =============================================================================
# Copy this to: .github/workflows/deploy-staging.yml

name: Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
      - uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
      - run: flutter pub get
      - run: flutter build web --release --dart-define=ENVIRONMENT=staging
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}
          channelId: live
          projectId: isuite-staging

# =============================================================================
# BUILD SCRIPTS
# =============================================================================
# Save this as: scripts/build.sh

#!/bin/bash

set -e

RED='\033[0;31m'
GREEN='\033[0;32m'
YELLOW='\033[1;33m'
NC='\033[0m'

PROJECT_NAME="iSuite"
BUILD_TYPE="${1:-release}"
PLATFORM="${2:-all}"

echo -e "${GREEN}Building $PROJECT_NAME ($BUILD_TYPE) for $PLATFORM${NC}"

if ! command -v flutter &> /dev/null; then
    echo -e "${RED}Flutter not found. Please install Flutter first.${NC}"
    exit 1
fi

flutter clean
flutter pub get

if [ "$BUILD_TYPE" = "release" ]; then
    flutter test
fi

case $PLATFORM in
    "android")
        flutter build apk --$BUILD_TYPE --split-debug-info=symbols --obfuscate
        flutter build appbundle --$BUILD_TYPE --split-debug-info=symbols --obfuscate
        ;;
    "web")
        flutter build web --$BUILD_TYPE --base-href=/isuite/
        ;;
    "windows")
        flutter build windows --$BUILD_TYPE
        ;;
    "all")
        flutter build apk --$BUILD_TYPE --split-debug-info=symbols --obfuscate
        flutter build appbundle --$BUILD_TYPE --split-debug-info=symbols --obfuscate
        flutter build web --$BUILD_TYPE --base-href=/isuite/
        flutter build windows --$BUILD_TYPE
        ;;
    *)
        echo -e "${RED}Unknown platform: $PLATFORM${NC}"
        echo "Available platforms: android, web, windows, all"
        exit 1
        ;;
esac

echo -e "${GREEN}Build completed successfully!${NC}"

# =============================================================================
# DEPLOYMENT SCRIPTS
# =============================================================================
# Save this as: scripts/deploy.sh

#!/bin/bash

set -e

ENVIRONMENT="${1:-staging}"
PLATFORM="${2:-web}"

echo "Deploying to $ENVIRONMENT environment..."

case $ENVIRONMENT in
    "staging")
        case $PLATFORM in
            "web")
                echo "Deploying web to Firebase staging..."
                firebase use staging
                firebase deploy --only hosting
                ;;
        esac
        ;;
    "production")
        case $PLATFORM in
            "web")
                echo "Deploying web to Firebase production..."
                firebase use production
                firebase deploy --only hosting
                ;;
        esac
        ;;
esac

echo "Deployment completed successfully!"

# =============================================================================
# MONITORING SCRIPTS
# =============================================================================
# Save this as: scripts/monitor.sh

#!/bin/bash

WEB_URL="https://isuite-production.web.app"
SLACK_WEBHOOK="${SLACK_WEBHOOK_URL}"

check_web() {
    if curl -f --max-time 10 "$WEB_URL" > /dev/null 2>&1; then
        echo "✅ Web health check passed"
        return 0
    else
        echo "❌ Web health check failed"
        return 1
    fi
}

main() {
    local failed_checks=0

    if ! check_web; then
        ((failed_checks++))
    fi

    if [ $failed_checks -gt 0 ]; then
        echo "❌ $failed_checks health checks failed"
        exit 1
    else
        echo "✅ All health checks passed"
        exit 0
    fi
}

main "$@"

# =============================================================================
# DOCKER CONFIGURATION
# =============================================================================
# Save this as: Dockerfile

FROM cirrusci/flutter:stable AS build

WORKDIR /app
COPY pubspec.* ./
RUN flutter pub get
COPY . .
RUN flutter build web --release --base-href=/

FROM nginx:alpine
COPY --from=build /app/build/web /usr/share/nginx/html
EXPOSE 80
CMD ["nginx", "-g", "daemon off;"]

# Save this as: docker-compose.yml

version: '3.8'

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb_data
    environment:
      - POCKETBASE_ENCRYPTION_KEY=key

  web:
    build: .
    ports:
      - "80:80"
    depends_on:
      - pocketbase

# =============================================================================
# LIGHTHOUSE CONFIGURATION
# =============================================================================
# Save this as: lighthouserc.json

{
  "ci": {
    "collect": {
      "numberOfRuns": 3,
      "startServerCommand": "cd build/web && python3 -m http.server 8000",
      "url": ["http://localhost:8000"]
    },
    "assert": {
      "assertions": {
        "categories:performance": ["error", {"minScore": 0.8}],
        "categories:accessibility": ["error", {"minScore": 0.9}],
        "categories:best-practices": ["error", {"minScore": 0.9}],
        "categories:seo": ["error", {"minScore": 0.9}],
        "categories:pwa": ["error", {"minScore": 0.8}]
      }
    }
  }
}

# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================

# 1. Create .github/workflows/ directory
# 2. Copy CI pipeline to .github/workflows/ci.yml
# 3. Copy deployment pipeline to .github/workflows/deploy-staging.yml
# 4. Create scripts/ directory and add build.sh, deploy.sh, monitor.sh
# 5. Add Dockerfile and docker-compose.yml to project root
# 6. Add lighthouserc.json for performance testing
# 7. Configure GitHub repository secrets for Firebase, etc.
# 8. Push to trigger CI/CD pipeline

# Repository Secrets Required:
# - FIREBASE_SERVICE_ACCOUNT_STAGING
# - FIREBASE_SERVICE_ACCOUNT_PRODUCTION
# - SLACK_WEBHOOK_URL (optional, for alerts)

# Usage:
# - CI: Automatic on push/PR to main/develop
# - Build: ./scripts/build.sh release all
# - Deploy: ./scripts/deploy.sh staging web
# - Monitor: ./scripts/monitor.sh
