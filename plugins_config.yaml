# Plugin System Configuration - Extensibility Parameterization
# ============================================================
# Complete plugin system parameterization for enterprise extensibility

# Core Plugin Settings
plugins.enabled: true
plugins.auto_update: true
plugins.marketplace_enabled: true
plugins.security_verification: true
plugins.sandbox_enabled: true
plugins.hot_reload: true
plugins.max_plugins: 50

# Plugin Loading
plugins.loading.strict_mode: false
plugins.loading.timeout_seconds: 30
plugins.loading.retry_attempts: 3
plugins.loading.dependency_resolution: true
plugins.loading.version_compatibility_check: true

# Marketplace Configuration
plugins.marketplace.url: "https://plugins.isuite.com/api"
plugins.marketplace.update_check_interval_hours: 24
plugins.marketplace.auto_install_updates: false
plugins.marketplace.verify_signatures: true
plugins.marketplace.trust_unknown_sources: false

# Security & Sandboxing
plugins.security.require_signature: true
plugins.security.code_verification: true
plugins.security.permission_granting: manual
plugins.security.resource_limits: true
plugins.security.isolation_level: high

# Plugin Permissions
plugins.permissions.file_access: false
plugins.permissions.network_access: false
plugins.permissions.database_access: false
plugins.permissions.system_access: false
plugins.permissions.ui_access: false

# Resource Management
plugins.resources.memory_limit_mb: 50
plugins.resources.cpu_limit_percent: 10
plugins.resources.disk_limit_mb: 100
plugins.resources.network_limit_kbps: 1000
plugins.resources.timeout_seconds: 300

# Lifecycle Management
plugins.lifecycle.auto_start: false
plugins.lifecycle.startup_order: priority
plugins.lifecycle.dependency_order: true
plugins.lifecycle.failure_handling: isolate
plugins.lifecycle.restart_on_failure: false

# Update Management
plugins.updates.enabled: true
plugins.updates.check_interval_hours: 24
plugins.updates.auto_backup: true
plugins.updates.rollback_enabled: true
plugins.updates.version_compatibility: true

# Plugin Discovery
plugins.discovery.local_scan: true
plugins.discovery.network_discovery: false
plugins.discovery.marketplace_scan: true
plugins.discovery.auto_discovery: false

# Development & Testing
plugins.development.debug_mode: false
plugins.development.hot_reload: true
plugins.development.logging_level: info
plugins.development.performance_monitoring: false

# Integration Settings
plugins.integration.api_version: "1.0.0"
plugins.integration.compatibility_mode: strict
plugins.integration.event_system: true
plugins.integration.data_sharing: false

# Monitoring & Analytics
plugins.monitoring.enabled: true
plugins.monitoring.usage_tracking: true
plugins.monitoring.performance_metrics: true
plugins.monitoring.error_reporting: true

# Cache & Performance
plugins.cache.enabled: true
plugins.cache.ttl_hours: 24
plugins.cache.max_size_mb: 200
plugins.cache.compression: true

# Backup & Recovery
plugins.backup.enabled: true
plugins.backup.interval_hours: 24
plugins.backup.retention_days: 30
plugins.backup.encryption: true

# User Interface
plugins.ui.visible_in_menu: true
plugins.ui.settings_integration: true
plugins.ui.customization_allowed: false
plugins.ui.branding_allowed: false

# Advanced Features
plugins.advanced.machine_learning: false
plugins.advanced.blockchain: false
plugins.advanced.distributed_computing: false
plugins.advanced.ai_integration: false

# Compliance & Audit
plugins.compliance.audit_logging: true
plugins.compliance.license_verification: true
plugins.compliance.security_scanning: true
plugins.compliance.gdpr_compliance: true

# Networking
plugins.network.proxy_support: false
plugins.network.firewall_rules: true
plugins.network.bandwidth_limiting: true
plugins.network.connection_pooling: true

# Storage
plugins.storage.isolated_storage: true
plugins.storage.encryption_required: true
plugins.storage.backup_integration: true
plugins.storage.sync_capabilities: false

# Error Handling
plugins.errors.graceful_degradation: true
plugins.errors.auto_recovery: true
plugins.errors.user_notifications: true
plugins.errors.detailed_logging: true

# Scalability
plugins.scalability.load_balancing: false
plugins.scalability.horizontal_scaling: false
plugins.scalability.resource_sharing: false
plugins.scalability.distributed_execution: false
