name: Enhanced CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  FLUTTER_VERSION: '3.16.0'
  JAVA_VERSION: '17'
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.9'

jobs:
  # Code Quality and Testing
  quality-check:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Generate localization
      run: flutter gen-l10n
      
    - name: Run Flutter Analyze
      run: flutter analyze --fatal-infos --fatal-warnings
      
    - name: Run Tests
      run: flutter test --coverage --reporter=expanded
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        
    - name: Run Python Tests (Manager)
      run: |
        pip install requests
        python -m pytest scripts/ -v || true
        
    - name: Check Code Formatting
      run: dart format --set-exit-if-changed .
      
    - name: Run Code Metrics
      run: |
        dart pub global activate dart_code_metrics
        dart_code_metrics lib/ --reporter=github > metrics.md || true
        
    - name: Security Scan
      run: |
        dart pub global activate pana
        pana . --no-warnings || true

  # Multi-Platform Builds
  build-matrix:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: quality-check
    
    strategy:
      matrix:
        include:
          - target: web
            os: ubuntu-latest
            build_command: flutter build web --release --web-renderer canvaskit
            artifact_name: web-build
            artifact_path: build/web
          - target: android
            os: ubuntu-latest
            build_command: flutter build apk --release
            artifact_name: android-apk
            artifact_path: build/app/outputs/flutter-apk/app-release.apk
          - target: android-appbundle
            os: ubuntu-latest
            build_command: flutter build appbundle --release
            artifact_name: android-aab
            artifact_path: build/app/outputs/bundle/release/app-release.aab
          - target: windows
            os: windows-latest
            build_command: flutter build windows --release
            artifact_name: windows-build
            artifact_path: build/windows/runner/Release
          - target: linux
            os: ubuntu-latest
            build_command: flutter build linux --release
            artifact_name: linux-build
            artifact_path: build/linux/x64/release/bundle
            
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Setup Java (for Android)
      if: matrix.target == 'android' || matrix.target == 'android-appbundle'
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Generate localization
      run: flutter gen-l10n
      
    - name: Build ${{ matrix.target }}
      run: ${{ matrix.build_command }}
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_path }}
        retention-days: 30

  # Security and Performance
  security-performance:
    name: Security & Performance
    runs-on: ubuntu-latest
    needs: quality-check
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Generate localization
      run: flutter gen-l10n
      
    - name: Build web app
      run: flutter build web --release --web-renderer canvaskit
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
        
    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v9
      with:
        configPath: '.lighthouserc.json'
        uploadArtifacts: true
        temporaryPublicStorage: true
        
    - name: Performance Test
      run: |
        # Install dependencies for performance testing
        sudo apt-get update
        sudo apt-get install -y xvfb
        
        # Run performance tests
        flutter test integration_test/performance_test.dart --device-id=web-server

  # Documentation Generation
  docs-generation:
    name: Documentation Generation
    runs-on: ubuntu-latest
    needs: quality-check
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: stable
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Generate API Documentation
      run: |
        dart pub global activate dartdoc
        dartdoc --output docs/api --exclude-private --exclude-internal
        
    - name: Generate Flutter Documentation
      run: |
        flutter pub global activate docsy_builder
        flutter-docs generate
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        destination_dir: iSuite

  # Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-matrix
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Generate localization
      run: flutter gen-l10n
      
    - name: Download web build artifacts
      uses: actions/download-artifact@v3
      with:
        name: web-build
        path: build/web
        
    - name: Start web server
      run: |
        cd build/web
        python3 -m http.server 8080 &
        SERVER_PID=$!
        sleep 5
        
    - name: Run integration tests
      run: |
        flutter test integration_test/ --reporter=expanded
        
    - name: Stop web server
      run: kill $SERVER_PID

  # Deployment
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-matrix, security-performance, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      
    - name: Deploy to Firebase Hosting
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: '${{ secrets.GITHUB_TOKEN }}'
        firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
        channelId: live
        projectId: isuite-prod
        target: web-build
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./web-build
        destination_dir: iSuite
        
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          android-apk/app-release.apk
          android-aab/app-release.aab
          
    - name: Notify Slack
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      if: always()

  # Post-Deployment Tests
  post-deployment:
    name: Post-Deployment Tests
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Install Lighthouse CI
      run: npm install -g @lhci/cli
      
    - name: Run Lighthouse CI on deployed app
      run: lhci autorun
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        LHCI_SERVER_BASE_URL: https://lhci.ishub.dev
        LHCI_SERVER_TOKEN: ${{ secrets.LHCI_SERVER_TOKEN }}
        
    - name: Health Check
      run: |
        # Check if the deployed app is responding
        curl -f https://isuite.ishub.dev/health || exit 1
        
    - name: Performance Check
      run: |
        # Check app performance
        curl -f https://isuite.ishub.dev/api/performance || exit 1

  # Build Manager Application
  build-manager:
    name: Build Manager Application
    runs-on: ubuntu-latest
    needs: quality-check
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        pip install requests
        pip install pyinstaller
        
    - name: Build Manager Executable
      run: |
        pyinstaller --onefile --windowed scripts/isuite_manager.py
        
    - name: Upload Manager Executable
      uses: actions/upload-artifact@v3
      with:
        name: isuite-manager
        path: dist/isuite_manager
        retention-days: 30

  # Quality Gate
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [quality-check, security-performance, integration-tests]
    if: always()
    
    steps:
    - name: Check Results
      run: |
        # Check if all required jobs passed
        if [ "${{ needs.quality-check.result }}" != "success" ]; then
          echo "Quality check failed"
          exit 1
        fi
        
        if [ "${{ needs.security-performance.result }}" != "success" ]; then
          echo "Security or performance check failed"
          exit 1
        fi
        
        if [ "${{ needs.integration-tests.result }}" != "success" ]; then
          echo "Integration tests failed"
          exit 1
        fi
        
        echo "All quality gates passed"
        
    - name: Update Status
      run: |
        echo "✅ All quality gates passed - Ready for deployment"
        
    - name: Create Quality Report
      run: |
        cat > quality-report.md << EOF
        # Quality Report
        
        ## Build Status
        - Quality Check: ${{ needs.quality-check.result }}
        - Security & Performance: ${{ needs.security-performance.result }}
        - Integration Tests: ${{ needs.integration-tests.result }}
        
        ## Metrics
        - Build Number: ${{ github.run_number }}
        - Commit: ${{ github.sha }}
        - Branch: ${{ github.ref }}
        
        ## Timestamp
        Generated: $(date)
        EOF
        
    - name: Upload Quality Report
      uses: actions/upload-artifact@v3
      with:
        name: quality-report
        path: quality-report.md
