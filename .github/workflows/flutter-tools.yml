name: Flutter Development Tools

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FLUTTER_VERSION: '3.16.0'
  JAVA_VERSION: '17'

jobs:
  # Flutter Doctor Check
  flutter_doctor:
    name: Flutter Doctor
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        
    - name: Flutter Doctor
      run: flutter doctor -v
      
    - name: Check Flutter Environment
      run: |
        echo "Flutter Version: $(flutter --version)"
        echo "Dart Version: $(dart --version)"
        echo "Flutter Doctor Status:"
        flutter doctor

  # Flutter Analyze
  flutter_analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Generate localization
      run: flutter gen-l10n
      
    - name: Flutter Analyze
      run: flutter analyze --fatal-infos --fatal-warnings
      
    - name: Check for unused files
      run: |
        # Check for unused imports and files
        flutter analyze --fatal-infos --fatal-warnings
        dart fix --dry-run lib/
        
    - name: Format Check
      run: dart format --set-exit-if-changed .

  # Flutter Test
  flutter_test:
    name: Flutter Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Generate localization
      run: flutter gen-l10n
      
    - name: Run unit tests
      run: flutter test --coverage --reporter=expanded
      
    - name: Run widget tests
      run: flutter test --coverage integration_test/
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  # Build Test
  build_test:
    name: Build Test
    runs-on: ubuntu-latest
    needs: [flutter_doctor, flutter_analyze, flutter_test]
    
    strategy:
      matrix:
        platform: [web, android, linux, windows]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Generate localization
      run: flutter gen-l10n
      
    - name: Build for ${{ matrix.platform }}
      run: |
        case "${{ matrix.platform }}" in
          "web")
            flutter build web --release --web-renderer canvaskit
            ;;
          "android")
            flutter build apk --release
            flutter build appbundle --release
            ;;
          "linux")
            flutter config --enable-linux-desktop
            flutter build linux --release
            ;;
          "windows")
            flutter config --enable-windows-desktop
            flutter build windows --release
            ;;
        esac
        
    - name: Check build artifacts
      run: |
        case "${{ matrix.platform }}" in
          "web")
            ls -la build/web/
            ;;
          "android")
            ls -la build/app/outputs/
            ;;
          "linux")
            ls -la build/linux/
            ;;
          "windows")
            ls -la build/windows/
            ;;
        esac

  # Code Quality Check
  code_quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: stable
        
    - name: Install dart_code_metrics
      run: dart pub global activate dart_code_metrics
      
    - name: Run code metrics
      run: dart_code_metrics lib/ --reporter=github > metrics.md
      
    - name: Install pana
      run: dart pub global activate pana
      
    - name: Check package health
      run: pana . --no-warnings
      
    - name: Upload metrics report
      uses: actions/upload-artifact@v3
      with:
        name: code-metrics
        path: metrics.md

  # Security Check
  security_check:
    name: Security Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
        
    - name: Check dependencies for vulnerabilities
      run: flutter pub deps --style=tree

  # Performance Check
  performance_check:
    name: Performance Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Generate localization
      run: flutter gen-l10n
      
    - name: Build web app for performance testing
      run: flutter build web --release --web-renderer canvaskit
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install Lighthouse CI
      run: npm install -g @lhci/cli
      
    - name: Run Lighthouse CI
      run: lhci autorun
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        LHCI_SERVER_BASE_URL: https://lhci.ishub.dev
        LHCI_SERVER_TOKEN: ${{ secrets.LHCI_SERVER_TOKEN }}

  # Documentation Check
  documentation_check:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: stable
        
    - name: Install dartdoc
      run: dart pub global activate dartdoc
      
    - name: Generate documentation
      run: dartdoc --output docs/api --exclude-private --exclude-internal
      
    - name: Check documentation coverage
      run: |
        # Check if documentation was generated successfully
        if [ ! -d "docs/api" ]; then
          echo "Documentation generation failed"
          exit 1
        fi
        
    - name: Check markdown files
      uses: DavidAnson/markdownlint-action@v1
      with:
        files: '**/*.md'
        config: '.markdownlint.json'

  # Integration Test
  integration_test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [build_test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Generate localization
      run: flutter gen-l10n
      
    - name: Run integration tests
      run: |
        # Start web server for testing
        flutter build web --release --web-renderer canvaskit
        cd build/web
        python3 -m http.server 8080 &
        SERVER_PID=$!
        sleep 5
        
        # Run integration tests
        cd ../..
        flutter test integration_test/ --reporter=expanded
        
        # Stop server
        kill $SERVER_PID
