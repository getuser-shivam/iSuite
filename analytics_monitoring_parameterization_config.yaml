# Data Processing - ETL and data pipeline
analytics.processing.batch_processing_enabled: true
analytics.processing.stream_processing_enabled: true
analytics.processing.data_validation_enabled: true
analytics.processing.data_transformation_enabled: true
analytics.processing.data_aggregation_enabled: true
analytics.processing.data_quality_checks: true

# Storage & Archival - Data lifecycle management
analytics.storage.hot_storage_days: 30
analytics.storage.warm_storage_days: 90
analytics.storage.cold_storage_days: 365
analytics.storage.archival_compression: true
analytics.storage.data_encryption_at_rest: true
