# Reporting - Automated and custom reports
analytics.reporting.auto_reports_enabled: true
analytics.reporting.report_schedule: "daily"
analytics.reporting.report_format: "json"
analytics.reporting.email_reports_enabled: false
analytics.reporting.dashboard_refresh_interval: 300
analytics.reporting.report_archival_days: 365
analytics.reporting.custom_report_builder: true
analytics.reporting.report_sharing_enabled: false
analytics.reporting.report_scheduling_flexible: true

# Real-time Analytics - Live data processing
analytics.realtime.enabled: true
analytics.realtime.stream_processing: true
analytics.realtime.event_buffering_seconds: 5
analytics.realtime.live_dashboard_updates: true
analytics.realtime.alerting_real_time: true
