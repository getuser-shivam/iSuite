# Integration - Third-party analytics platforms
analytics.integration.google_analytics_enabled: false
analytics.integration.firebase_analytics_enabled: true
analytics.integration.mixpanel_enabled: false
analytics.integration.amplitude_enabled: false
analytics.integration.segment_enabled: false
analytics.integration.custom_integrations_allowed: true

