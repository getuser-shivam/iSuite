# Connection Pool Parameters
network.connection.pool_size_min: 1
network.connection.pool_size_max: 20
network.connection.keep_alive_duration: 300
network.connection.idle_timeout: 60
network.connection.max_concurrent_requests: 10
network.connection.request_timeout_base: 30
network.connection.request_timeout_max: 300
network.connection.retry_backoff_multiplier: 2.0
