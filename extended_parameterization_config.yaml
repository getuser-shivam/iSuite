# Caching Parameters
network.cache.memory_cache_size_mb: 10
network.cache.disk_cache_size_mb: 50
network.cache.cache_strategy: "cache_first"
network.cache.stale_while_revalidate: true
network.cache.cache_key_generation: "url_only"
network.cache.cache_invalidation_auto: true
network.cache.offline_cache_enabled: true
