# Build Configuration for iSuite
# ===============================
# Configuration for optimized build process and CI/CD

# Build Optimization Settings
build:
  enabled: true
  caching: true
  parallel_builds: true
  max_concurrent_builds: 3

  # Cache Configuration
  cache:
    enabled: true
    max_size_gb: 2
    retention_days: 7
    compression: true

  # Platform-specific Builds
  platforms:
    android:
      enabled: true
      build_types: [debug, profile, release]
      optimizations:
        r8_full_mode: true
        shrink_resources: true
        abi_splits: true
        dexing_artifact_transform: true

    ios:
      enabled: true
      build_types: [debug, profile, release]
      optimizations:
        bitcode: true
        app_thinning: true
        symbols_stripping: true

    web:
      enabled: true
      build_types: [debug, profile, release]
      optimizations:
        canvaskit: true
        csp: true
        code_splitting: true
        asset_compression: true

    windows:
      enabled: true
      build_types: [debug, profile, release]
      optimizations:
        optimization_level: 2
        lto: true

    linux:
      enabled: true
      build_types: [debug, profile, release]
      optimizations:
        optimization_level: 2
        native_compilation: true

    macos:
      enabled: true
      build_types: [debug, profile, release]
      optimizations:
        optimization_level: 2
        universal_binary: false

# Build Performance Settings
performance:
  build_tracking: true
  build_timeout: 1800
  slow_build_threshold: 300
  incremental_builds: true
  dependency_optimization: true

# Quality Assurance
quality:
  enabled: true
  test_coverage: 80
  integration_tests: true
  performance_tests: true
  linting: true
  formatting: true
  security_audit: true

# CI/CD Integration
ci_cd:
  enabled: true
  github_actions: true
  auto_deploy: false
  artifact_retention: 30
  notification_webhooks: []

# Development Tools
development:
  hot_reload: true
  hot_restart: true
  devtools: true
  performance_overlay: false
  debug_logging: true

# Distribution
distribution:
  enabled: true
  stores:
    google_play: false
    app_store: false
    microsoft_store: false
    snapcraft: false
  signing:
    enabled: false
    keystore_path: ""
    key_alias: ""
  versioning:
    auto_increment: false
    version_format: "semantic"
