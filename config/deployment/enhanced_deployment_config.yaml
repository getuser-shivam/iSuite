# Enhanced Configuration for Deployment
# Complete parameterized configuration for iSuite deployment
# Features: Multi-platform builds, free hosting, performance optimization
# Security: Code signing, encryption, secure deployment
# Performance: Parallel builds, caching, optimization

# =============================================================================
# BUILD CONFIGURATION
# =============================================================================
build:
  flutter:
    version: "3.19.0"
    channels: ["stable"]
    
  version:
    major: 2
    minor: 0
    patch: 0
    build_number: "${BUILD_NUMBER}"
    
  optimization:
    enable_obfuscation: true
    enable_shrinking: true
    enable_tree_shaking: true
    enable_dead_code_elimination: true
    
  testing:
    enable_unit_tests: true
    enable_integration_tests: true
    enable_widget_tests: true
    enable_e2e_tests: false
    coverage_threshold: 80.0
    
  analysis:
    enable_static_analysis: true
    enable_linting: true
    enable_formatting: true
    enable_security_scan: true
    
  parallel_builds: true
  build_timeout_minutes: 30

# =============================================================================
# PLATFORM CONFIGURATION
# =============================================================================
platforms:
  android:
    enabled: true
    min_sdk: 21
    target_sdk: 34
    compile_sdk: 34
    architectures: ["arm64-v8a", "armeabi-v7a", "x86_64"]
    
    build:
      debug: true
      release: true
      profile: true
      
    signing:
      enable_code_signing: false
      keystore_path: "${KEYSTORE_PATH}"
      keystore_password: "${KEYSTORE_PASSWORD}"
      key_alias: "${KEY_ALIAS}"
      key_password: "${KEY_PASSWORD}"
    
    deployment:
      play_store: false
      fdroid: true
      direct_apk: true
      app_bundle: true
      
    performance:
      enable_r8: true
      enable_proguard: true
      enable_resource_shrinking: true
    
    features:
      enable_split_apk: true
      enable_bundle: true
      enable_instant_apps: false

  ios:
    enabled: true
    min_version: "12.0"
    target_version: "17.0"
    architectures: ["arm64", "armv7"]
    
    build:
      debug: true
      release: true
      profile: true
      
    signing:
      enable_code_signing: false
      development_team: "${DEVELOPMENT_TEAM}"
      provisioning_profile: "${PROVISIONING_PROFILE}"
      certificate: "${CERTIFICATE}"
    
    deployment:
      app_store: false
      test_flight: true
      enterprise: false
      sideloading: true
      
    performance:
      enable_bitcode: false
      enable_strip: true
      enable_thinning: true
    
    features:
      enable_app_clips: false
      enable_widgets: true
      enable_siri_shortcuts: true

  windows:
    enabled: true
    min_version: "10.0"
    architectures: ["x64", "arm64"]
    
    build:
      debug: true
      release: true
      store_ready: true
      
    signing:
      enable_code_signing: false
      certificate_path: "${WINDOWS_CERT_PATH}"
      certificate_password: "${WINDOWS_CERT_PASSWORD}"
    
    deployment:
      microsoft_store: false
      direct_exe: true
      msi_installer: true
      
    performance:
      enable_optimization: true
      enable_compression: true
    
    features:
      enable_uwp: false
      enable_desktop_bridge: true

  linux:
    enabled: true
    distributions: ["ubuntu", "debian", "fedora", "arch"]
    architectures: ["x64", "arm64"]
    
    build:
      debug: true
      release: true
      
    deployment:
      appimage: true
      snap: true
      flatpak: true
      deb: true
      rpm: true
      
    performance:
      enable_optimization: true
      enable_strip: true
    
    features:
      enable_desktop_integration: true
      enable_auto_update: true

  macos:
    enabled: true
    min_version: "10.14"
    architectures: ["x64", "arm64"]
    
    build:
      debug: true
      release: true
      
    signing:
      enable_code_signing: false
      developer_id: "${MACOS_DEVELOPER_ID}"
      certificate: "${MACOS_CERTIFICATE}"
    
    deployment:
      app_store: false
      direct_dmg: true
      homebrew: true
      
    performance:
      enable_optimization: true
      enable_strip: true
    
    features:
      enable_sandbox: true
      enable_hardened_runtime: true

  web:
    enabled: true
    renderers: ["canvaskit", "html"]
    
    build:
      debug: true
      release: true
      web_worker: true
      
    optimization:
      enable_tree_shaking: true
      enable_dead_code_elimination: true
      enable_minification: true
      enable_compression: true
    
    deployment:
      github_pages: true
      netlify: true
      vercel: true
      cloudflare_pages: true
      firebase_hosting: true
      
    features:
      enable_pwa: true
      enable_service_worker: true
      enable_offline_support: true

# =============================================================================
# FREE HOSTING CONFIGURATION
# =============================================================================
free_hosting:
  railway:
    enabled: true
    free_tier:
      hours_per_month: 500
      ram_mb: 512
      cpu_cores: 1
      storage_gb: 1
    
    configuration:
      builder: "NIXPACKS"
      start_command: "serve -s build/web -l 10000"
      healthcheck_path: "/"
    
    environment_variables:
      FLUTTER_WEB: "true"
      BUILD_NUMBER: "${BUILD_NUMBER}"
    
    deployment:
      auto_deploy: true
      domain: "${RAILWAY_DOMAIN}"
    
  render:
    enabled: true
    free_tier:
      hours_per_month: 750
      ram_mb: 512
      cpu_cores: 1
      storage_gb: 1
    
    configuration:
      runtime: "static"
      build_command: "flutter build web --release"
      static_publish_path: "build/web"
    
    environment_variables:
      FLUTTER_WEB: "true"
    
    deployment:
      auto_deploy: true
      domain: "${RENDER_DOMAIN}"
  
  flyio:
    enabled: true
    free_tier:
      hours_per_month: 160
      ram_mb: 256
      cpu_cores: 1
      shared_cpu: true
    
    configuration:
      app_name: "isuite-web"
      internal_port: 8080
      protocol: "tcp"
    
    environment_variables:
      FLUTTER_WEB: "true"
    
    deployment:
      auto_deploy: true
      domain: "${FLYIO_DOMAIN}"
  
  github_pages:
    enabled: true
    free_tier:
      storage_gb: 1
      bandwidth_gb: 100
    
    configuration:
      source: "build/web"
      branch: "gh-pages"
    
    deployment:
      auto_deploy: true
      domain: "${GITHUB_DOMAIN}"
  
  netlify:
    enabled: true
    free_tier:
      sites: 1
      bandwidth_gb: 100
      build_minutes: 300
    
    configuration:
      build_command: "flutter build web --release"
      publish_dir: "build/web"
    
    environment_variables:
      FLUTTER_WEB: "true"
    
    deployment:
      auto_deploy: true
      domain: "${NETLIFY_DOMAIN}"
  
  vercel:
    enabled: true
    free_tier:
      projects: 1
      bandwidth_gb: 100
      functions_invocations: 100000
    
    configuration:
      build_command: "flutter build web --release"
      output_directory: "build/web"
    
    environment_variables:
      FLUTTER_WEB: "true"
    
    deployment:
      auto_deploy: true
      domain: "${VERCEL_DOMAIN}"

# =============================================================================
# PERFORMANCE OPTIMIZATION
# =============================================================================
performance:
  caching:
    enable_build_cache: true
    enable_dependency_cache: true
    enable_asset_cache: true
    
  optimization:
    enable_aot_compilation: true
    enable_tree_shaking: true
    enable_dead_code_elimination: true
    enable_resource_optimization: true
    
  compression:
    enable_gzip: true
    enable_brotli: true
    compression_level: 6
    
  lazy_loading:
    enable_lazy_loading: true
    enable_code_splitting: true
    enable_asset_splitting: true

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================
security:
  code_signing:
    enable_android_signing: false
    enable_ios_signing: false
    enable_windows_signing: false
    enable_macos_signing: false
    
  encryption:
    enable_asset_encryption: false
    enable_source_encryption: false
    encryption_algorithm: "AES-256-GCM"
    
  security_scan:
    enable_dependency_scan: true
    enable_vulnerability_scan: true
    enable_code_analysis: true
    
  network_security:
    enable_ssl_pinning: false
    enable_certificate_validation: true
    enable_cors: true

# =============================================================================
# MONITORING CONFIGURATION
# =============================================================================
monitoring:
  build_monitoring:
    enable_build_metrics: true
    enable_performance_metrics: true
    enable_error_tracking: true
    
  deployment_monitoring:
    enable_health_checks: true
    enable_uptime_monitoring: true
    enable_error_reporting: true
    
  analytics:
    enable_build_analytics: true
    enable_deployment_analytics: true
    enable_user_analytics: false

# =============================================================================
# ENVIRONMENT VARIABLES
# =============================================================================
environment:
  # Build configuration
  BUILD_NUMBER: "${BUILD_NUMBER}"
  VERSION: "2.0.0"
  FLUTTER_VERSION: "3.19.0"
  
  # Platform-specific
  KEYSTORE_PATH: "${KEYSTORE_PATH}"
  KEYSTORE_PASSWORD: "${KEYSTORE_PASSWORD}"
  KEY_ALIAS: "${KEY_ALIAS}"
  KEY_PASSWORD: "${KEY_PASSWORD}"
  
  DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
  PROVISIONING_PROFILE: "${PROVISIONING_PROFILE}"
  CERTIFICATE: "${CERTIFICATE}"
  
  WINDOWS_CERT_PATH: "${WINDOWS_CERT_PATH}"
  WINDOWS_CERT_PASSWORD: "${WINDOWS_CERT_PASSWORD}"
  
  MACOS_DEVELOPER_ID: "${MACOS_DEVELOPER_ID}"
  MACOS_CERTIFICATE: "${MACOS_CERTIFICATE}"
  
  # Free hosting
  RAILWAY_API_KEY: "${RAILWAY_API_KEY}"
  RAILWAY_DOMAIN: "${RAILWAY_DOMAIN}"
  
  RENDER_API_KEY: "${RENDER_API_KEY}"
  RENDER_DOMAIN: "${RENDER_DOMAIN}"
  
  FLY_API_KEY: "${FLY_API_KEY}"
  FLYIO_DOMAIN: "${FLYIO_DOMAIN}"
  
  GITHUB_TOKEN: "${GITHUB_TOKEN}"
  GITHUB_DOMAIN: "${GITHUB_DOMAIN}"
  
  NETLIFY_AUTH_TOKEN: "${NETLIFY_AUTH_TOKEN}"
  NETLIFY_DOMAIN: "${NETLIFY_DOMAIN}"
  
  VERCEL_TOKEN: "${VERCEL_TOKEN}"
  VERCEL_DOMAIN: "${VERCEL_DOMAIN}"
  
  # Security
  ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
  SIGNING_KEY: "${SIGNING_KEY}"
  
  # Monitoring
  SENTRY_DSN: "${SENTRY_DSN}"
  ANALYTICS_KEY: "${ANALYTICS_KEY}"

# =============================================================================
# DEPLOYMENT PIPELINES
# =============================================================================
pipelines:
  pre_build:
    - name: "validate_environment"
      command: "flutter doctor"
    - name: "clean_project"
      command: "flutter clean"
    - name: "get_dependencies"
      command: "flutter pub get"
    - name: "validate_dependencies"
      command: "flutter pub deps"
  
  build:
    - name: "run_tests"
      command: "flutter test --coverage"
      condition: "${ENABLE_TESTS} == true"
    - name: "run_analysis"
      command: "flutter analyze"
      condition: "${ENABLE_ANALYSIS} == true"
    - name: "format_code"
      command: "dart format ."
    - name: "build_android"
      command: "flutter build apk --release"
      condition: "android.enabled == true"
    - name: "build_ios"
      command: "flutter build ios --release"
      condition: "ios.enabled == true"
    - name: "build_windows"
      command: "flutter build windows --release"
      condition: "windows.enabled == true"
    - name: "build_linux"
      command: "flutter build linux --release"
      condition: "linux.enabled == true"
    - name: "build_macos"
      command: "flutter build macos --release"
      condition: "macos.enabled == true"
    - name: "build_web"
      command: "flutter build web --release"
      condition: "web.enabled == true"
  
  post_build:
    - name: "generate_report"
      command: "python scripts/generate_report.py"
    - name: "upload_artifacts"
      command: "python scripts/upload_artifacts.py"
    - name: "notify_team"
      command: "python scripts/notify_team.py"
  
  deploy:
    - name: "deploy_railway"
      command: "railway up"
      condition: "free_hosting.railway.enabled == true"
    - name: "deploy_render"
      command: "render deploy"
      condition: "free_hosting.render.enabled == true"
    - name: "deploy_flyio"
      command: "flyctl deploy"
      condition: "free_hosting.flyio.enabled == true"
    - name: "deploy_github_pages"
      command: "gh pages --source build/web"
      condition: "free_hosting.github_pages.enabled == true"
    - name: "deploy_netlify"
      command: "netlify deploy --prod"
      condition: "free_hosting.netlify.enabled == true"
    - name: "deploy_vercel"
      command: "vercel --prod"
      condition: "free_hosting.vercel.enabled == true"

# =============================================================================
# NOTIFICATION CONFIGURATION
# =============================================================================
notifications:
  slack:
    enabled: false
    webhook_url: "${SLACK_WEBHOOK_URL}"
    channel: "#deployments"
    
  discord:
    enabled: false
    webhook_url: "${DISCORD_WEBHOOK_URL}"
    
  email:
    enabled: false
    smtp_server: "${SMTP_SERVER}"
    smtp_port: 587
    username: "${SMTP_USERNAME}"
    password: "${SMTP_PASSWORD}"
    recipients: ["team@example.com"]
    
  teams:
    enabled: false
    webhook_url: "${TEAMS_WEBHOOK_URL}"

# =============================================================================
# ROLLBACK CONFIGURATION
# =============================================================================
rollback:
  enable_rollback: true
  rollback_strategies:
    - "previous_build"
    - "stable_version"
    - "manual_rollback"
  
  backup:
    enable_backup: true
    backup_location: "s3://isuite-backups/"
    retention_days: 30

# =============================================================================
# FEATURE FLAGS
# =============================================================================
feature_flags:
  enable_experimental_features: false
  enable_beta_features: false
  enable_debug_features: false
  enable_performance_features: true
  enable_security_features: true
