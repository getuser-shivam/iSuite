# Cross-Platform Configuration - Free Framework Stack
# This configuration ensures complete cross-platform compatibility at zero cost

framework:
  # Flutter - Free and Open Source
  flutter:
    version: "3.19.0"
    channels: ["stable"]
    
    # Platform support
    platforms:
      android:
        enabled: true
        min_sdk: 21
        target_sdk: 34
        compile_sdk: 34
        
        # Free build and deployment
        build:
          debug: true
          release: true
          profile: true
          
        # Free deployment options
        deployment:
          play_store: false  # $25 one-time fee
          fdroid: true       # Completely free
          direct_apk: true   # Completely free
          app_bundle: true   # Required for Play Store
      
      ios:
        enabled: true
        min_version: "12.0"
        target_version: "17.0"
        
        # Free development (requires Apple Developer Program for distribution)
        development:
          simulator: true   # Free
          device: true      # Free with personal provisioning
        
        # Deployment options
        deployment:
          app_store: false  # $99/year
          test_flight: true # Free with developer account
          enterprise: false # $299/year
          sideloading: true # Free with enterprise program
      
      windows:
        enabled: true
        min_version: "10.0"
        
        # Free development and deployment
        build:
          debug: true
          release: true
          store_ready: true
        
        deployment:
          microsoft_store: false  # $19 one-time fee
          direct_exe: true        # Completely free
          msi_installer: true      # Free
      
      linux:
        enabled: true
        distributions: ["ubuntu", "debian", "fedora", "arch"]
        
        # Free development and deployment
        build:
          debug: true
          release: true
          appimage: true
          snap: true
          flatpak: true
        
        deployment:
          snap_store: false    # Free but requires review
          flathub: true        # Free and open
          direct_deb: true     # Free
      
      macos:
        enabled: true
        min_version: "10.14"
        
        # Free development
        development:
          debug: true
          release: true
        
        deployment:
          app_store: false     # $99/year
          direct_dmg: true      # Free
          homebrew: true        # Free
      
      web:
        enabled: true
        engines: ["canvaskit", "html"]
        
        # Free web hosting options
        hosting:
          github_pages: true     # Free
          netlify: true          # Free tier
          vercel: true           # Free tier
          cloudflare_pages: true # Free tier
          firebase_hosting: true # Free tier
          surge_sh: true         # Free tier
          glitch: true           # Free tier

  # PocketBase - Free Backend
  backend:
    pocketbase:
      version: "0.23.2"
      license: "MIT"  # Completely free
      
      # Free hosting options
      hosting:
        local: true           # Completely free
        railway: true         # $0/month free tier
        render: true          # $0/month free tier
        flyio: true           # Free allowance
        digitalocean: true    # $0/month free tier
        heroku: true          # $0/month eco plan
        self_hosted: true     # Completely free
      
      # Features included for free
      features:
        database: true        # SQLite built-in
        authentication: true   # All auth methods free
        file_storage: true    # Local storage free
        real_time: true       # WebSocket support free
        api: true            # REST API free
        admin_panel: true     # Admin interface free
        backups: true        # Automated backups free

  # State Management - Free Options
  state_management:
    riverpod:
      enabled: true
      version: "^2.4.9"
      license: "MIT"  # Free
      
    provider:
      enabled: true
      version: "^6.1.1"
      license: "MIT"  # Free

  # Database - Free Options
  database:
    local:
      sqlite:
        enabled: true
        version: "^3.1.0+1"
        license: "BSD"  # Free
      
      isar:
        enabled: true
        version: "^3.1.0+1"
        license: "Apache-2.0"  # Free
    
    cloud:
      # Free cloud database options
      supabase:
        enabled: true
        version: "^2.5.0"
        free_tier: "2GB storage, 50MB database, 50k MAU"
        
      firebase:
        enabled: false
        free_tier: "1GB storage, 10GB downloads, 125k MAU"

  # Storage - Free Options
  storage:
    local:
      shared_preferences:
        enabled: true
        version: "^2.2.2"
        license: "BSD"  # Free
      
      path_provider:
        enabled: true
        version: "^2.1.1"
        license: "BSD"  # Free
    
    cloud:
      # Free cloud storage options
      supabase_storage:
        enabled: true
        free_tier: "1GB storage, 2GB bandwidth"
      
      cloudinary:
        enabled: true
        free_tier: "25GB storage, 25GB bandwidth"
      
      aws_s3:
        enabled: false
        free_tier: "5GB storage, 20k requests"

  # Networking - Free Options
  networking:
    http_clients:
      http:
        enabled: true
        version: "^1.2.0"
        license: "BSD"  # Free
      
      dio:
        enabled: true
        version: "^5.4.0"
        license: "MIT"  # Free
    
    file_sharing:
      ftp:
        enabled: true
        version: "^2.0.10"
        license: "MIT"  # Free
      
      webdav:
        enabled: true
        version: "^1.2.0"
        license: "MIT"  # Free
      
      p2p:
        enabled: true
        version: "^3.0.3"
        license: "MIT"  # Free

  # UI Components - Free Options
  ui:
    material:
      enabled: true
      version: "built-in"
      license: "BSD"  # Free
    
    cupertino:
      enabled: true
      version: "built-in"
      license: "BSD"  # Free
    
    icons:
      material_icons:
        enabled: true
        version: "^7.0.7296"
        license: "Apache-2.0"  # Free
      
      cupertino_icons:
        enabled: true
        version: "^1.0.6"
        license: "MIT"  # Free
    
    fonts:
      google_fonts:
        enabled: true
        version: "^6.1.0"
        license: "Apache-2.0"  # Free
    
    charts:
      fl_chart:
        enabled: true
        version: "^0.65.0"
        license: "Apache-2.0"  # Free
      
      syncfusion_flutter_charts:
        enabled: true
        version: "^24.2.9"
        license: "Free Community License"

  # Animation - Free Options
  animation:
    lottie:
      enabled: true
      version: "^3.0.0"
      license: "MIT"  # Free
    
    shimmer:
      enabled: true
      version: "^3.0.0"
      license: "MIT"  # Free

  # Image Processing - Free Options
  image:
    cached_network_image:
      enabled: true
      version: "^3.3.0"
      license: "MIT"  # Free
    
    image_picker:
      enabled: true
      version: "^1.0.4"
      license: "MIT"  # Free
    
    flutter_svg:
      enabled: true
      version: "^2.0.9"
      license: "MIT"  # Free

  # Maps - Free Options
  maps:
    flutter_map:
      enabled: true
      version: "^6.1.0"
      license: "BSD"  # Free
      provider: "OpenStreetMap"  # Free
    
    google_maps:
      enabled: false
      license: "Requires API key with billing"

  # Testing - Free Options
  testing:
    unit:
      flutter_test:
        enabled: true
        version: "built-in"
        license: "BSD"  # Free
      
      test:
        enabled: true
        version: "^1.24.9"
        license: "BSD"  # Free
    
    integration:
      integration_test:
        enabled: true
        version: "built-in"
        license: "BSD"  # Free
    
    mocking:
      mockito:
        enabled: true
        version: "^5.4.4"
        license: "Apache-2.0"  # Free

  # Development Tools - Free Options
  development:
    code_generation:
      json_serializable:
        enabled: true
        version: "^6.7.1"
        license: "Apache-2.0"  # Free
      
      build_runner:
        enabled: true
        version: "^2.4.7"
        license: "BSD"  # Free
    
    linting:
      flutter_lints:
        enabled: true
        version: "^3.0.1"
        license: "BSD"  # Free
    
    documentation:
      dartdoc:
        enabled: true
        version: "^8.0.4"
        license: "BSD"  # Free

  # Deployment - Free Options
  deployment:
    mobile:
      android:
        fdroid: true           # Free
        direct_apk: true       # Free
        github_releases: true  # Free
      
      ios:
        test_flight: true      # Free with dev account
        altstore: true         # Free
        sideloadly: true       # Free
    
    desktop:
      windows:
        github_releases: true  # Free
        chocolatey: true       # Free
        winget: true          # Free
      
      linux:
        github_releases: true  # Free
        flathub: true         # Free
        snap_store: true      # Free
      
      macos:
        github_releases: true  # Free
        homebrew: true        # Free
    
    web:
      github_pages: true      # Free
      netlify: true          # Free
      vercel: true           # Free
      cloudflare_pages: true # Free
      firebase_hosting: true # Free
      surge_sh: true         # Free

# Cost Summary
cost_analysis:
  framework_costs:
    flutter: "$0"           # Free and open source
    pocketbase: "$0"        # Free and open source
    riverpod: "$0"          # Free and open source
    sqlite: "$0"           # Free and open source
    
  development_costs:
    ide: "$0"               # VS Code free
    build_tools: "$0"       # Flutter SDK free
    testing: "$0"           # All testing tools free
    
  hosting_costs:
    local_development: "$0"  # Free
    pocketbase_self_hosted: "$0"  # Free
    railway_free_tier: "$0"  # $0/month
    render_free_tier: "$0"   # $0/month
    github_pages: "$0"       # Free
    netlify_free_tier: "$0"  # $0/month
    
  distribution_costs:
    android_fdroid: "$0"     # Free
    windows_direct: "$0"     # Free
    linux_direct: "$0"       # Free
    web_hosting: "$0"        # Free
  
  total_monthly_cost: "$0"   # Completely free solution
  total_setup_cost: "$0"     # Completely free solution

# Configuration Parameters
parameters:
  # All configuration values are parameterized and can be overridden
  override_methods:
    environment_variables: true
    config_files: true
    command_line: true
    runtime_api: true
  
  # Configuration locations
  config_locations:
    - "config/pocketbase/pocketbase_config.yaml"
    - "config/platform/platform_config.yaml"
    - "config/deployment/deployment_config.yaml"
    - ".env"  # Environment variables
    - "config/local/local_config.yaml"  # Local overrides
